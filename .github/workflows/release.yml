name: Release

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Package
        run: bun run build

      - name: Create Release Pull Request
        id: changesets
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage Package Publish
        if: github.ref == 'refs/heads/staging'
        run: |
          package_name=$(node --print "require('./package.json').name")
          version=$(node --print "require('./package.json').version")

          if npm view "$package_name@$version" version >/dev/null 2>&1; then
            echo "$package_name@$version is already published"
            exit 0
          fi

          package_tarball=$(npm pack --ignore-scripts --silent)
          npm stage publish "$package_tarball" --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/staging'
        run: |
          version=$(node --print "require('./package.json').version")
          tag="v$version"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            exit 0
          fi

          awk -v version="$version" '
            $0 == "## " version { printing = 1; next }
            printing && /^## / { exit }
            printing { print }
          ' CHANGELOG.md > release-notes.md

          gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes-file release-notes.md --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
