name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_release:
        description: Retry publish for the current package.json version (e.g. after a failed publish)
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  version:
    name: Version packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # commitMode: github-api pushes version bumps via the GitHub REST API so
      # commits are GPG-signed by GitHub (verified). Required for repos with a
      # required_signatures ruleset; git-cli commits from github-actions[bot] are unsigned.
      # version-packages also runs sync-deno so deno.json matches package.json.
      - name: Create release pull request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish release
    needs: version
    if: |
      needs.version.outputs.has_changesets == 'false' && (
        startsWith(github.event.head_commit.message, 'chore: version packages') ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      # npm stage requires CLI >= 11.15.0. Do not set registry-url on setup-node —
      # it writes _authToken=${NODE_AUTH_TOKEN} to .npmrc and blocks OIDC publishing.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager: npm
          package-manager-version: "11.17.0"
          package-manager-cache: false

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish package
        run: bun run ./scripts/release-publish-npm.ts

      - name: Publish to JSR
        run: bun run jsr:publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run ./scripts/release-github.ts
