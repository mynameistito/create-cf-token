name: Publish Preview

on:
  pull_request:

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - run: bunx pkg-pr-new publish --comment=create --bun --packageManager=bun
